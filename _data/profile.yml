short_bio_text_justify: false
short_bio: >-
  <p>
    I am an <span class="text-hl">AR/VR Research Scientist</span> in
    <span class="text-hl">Global Technology Applied Research</span> at
    <span class="text-hl">JPMorganChase</span>, where I design and study XR systems that support
    human collaboration in complex, real-world settings.
    My research sits at the intersection of
    <span class="text-hl">XR</span>,
    <span class="text-hl">HCI/CSCW</span>, and
    <span class="text-hl">AI-enabled interaction</span>,
    focusing on how spatial interfaces can enhance shared awareness,
    decision making, and group work.
  </p>

  <p>
    I build <span class="text-hl">XR + AI systems</span> that integrate spatial interaction with
    perception, multimodal language models, and agent-based workflows.
    Rather than treating AI as a standalone assistant, my work explores how AI can operate
    <em>within</em> XR environments to surface relevant context, enable parallel work,
    and maintain traceability across collaborative activities.
  </p>

  <p>
    My work has explored collaborative meetings, hybrid events, mentoring, and
    collaborative decision-making, and has been published in venues such as
    <span class="text-hl">ACM CHI</span>,
    <span class="text-hl">CSCW</span>, and
    <span class="text-hl">IEEE ISMAR</span>.
  </p>

  <p>
    I received my <span class="text-hl">PhD in Information Science</span> from
    <span class="text-hl">Cornell University</span>, following
    BS/MS degrees in Computer Science.
  </p>

